<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Bonjour</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: #0a0a0f;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ÉCRAN 1 : RÉVEIL */
    #screen-wake {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      gap: 0;
    }

    .greeting {
      font-size: 15px;
      font-weight: 400;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .big-time {
      font-size: 88px;
      font-weight: 200;
      letter-spacing: -4px;
      line-height: 1;
      margin-bottom: 6px;
    }

    .big-date {
      font-size: 17px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 48px;
      text-transform: capitalize;
    }

    /* Météo */
    .weather-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 20px 28px;
      width: 100%;
      max-width: 340px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 48px;
    }

    .weather-icon { font-size: 48px; line-height: 1; }

    .weather-info { flex: 1; }
    .weather-temp { font-size: 36px; font-weight: 300; line-height: 1; }
    .weather-desc { font-size: 14px; color: rgba(255,255,255,0.5); margin-top: 4px; text-transform: capitalize; }
    .weather-details { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 6px; }

    .weather-loading { font-size: 14px; color: rgba(255,255,255,0.35); }

    .hourly-row {
      display: flex; gap: 6px; overflow-x: auto; padding: 14px 0 2px;
      border-top: 1px solid rgba(255,255,255,0.07); margin-top: 14px; width: 100%;
      scrollbar-width: none;
    }
    .hourly-row::-webkit-scrollbar { display: none; }
    .hour-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      min-width: 48px; padding: 8px 4px; border-radius: 10px;
      background: rgba(255,255,255,0.04); flex-shrink: 0;
    }
    .hour-item.now { background: rgba(99,102,241,0.18); }
    .hour-time { font-size: 11px; color: rgba(255,255,255,0.4); }
    .hour-item.now .hour-time { color: #818cf8; font-weight: 600; }
    .hour-icon { font-size: 18px; }
    .hour-temp { font-size: 13px; font-weight: 500; }

    /* Bouton lancer quiz */
    .btn-start {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 16px;
      padding: 18px 48px;
      font-size: 17px;
      font-weight: 500;
      color: #fff;
      cursor: pointer;
      width: 100%;
      max-width: 340px;
      letter-spacing: 0.02em;
    }
    .btn-start:active { opacity: 0.85; transform: scale(0.98); }

    .sub-hint {
      margin-top: 16px;
      font-size: 13px;
      color: rgba(255,255,255,0.2);
    }

    /* ÉCRAN 2 : QUIZ */
    #screen-quiz {
      display: none;
      min-height: 100vh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .progress-wrap {
      width: 100%;
      max-width: 360px;
      margin-bottom: 32px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      margin-bottom: 10px;
    }

    .progress-bar-bg {
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    .quiz-card {
      background: #141420;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 36px 28px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .q-badge {
      display: inline-block;
      background: rgba(99,102,241,0.15);
      color: #818cf8;
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 14px;
      margin-bottom: 24px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .q-text {
      font-size: 22px;
      font-weight: 500;
      line-height: 1.45;
      margin-bottom: 32px;
      min-height: 66px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .answer-reveal {
      font-size: 20px;
      font-weight: 600;
      color: #34d399;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .answer-reveal.show { opacity: 1; transform: translateY(0); }

    .btn-reveal {
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3);
      color: #818cf8;
      border-radius: 14px;
      padding: 14px 36px;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
      margin-bottom: 16px;
    }
    .btn-reveal:active { opacity: 0.75; }

    .result-row {
      display: none;
      gap: 10px;
    }

    .btn-ok, .btn-ko {
      flex: 1;
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      border: none;
    }
    .btn-ok {
      background: rgba(52,211,153,0.15);
      border: 1px solid rgba(52,211,153,0.3);
      color: #34d399;
    }
    .btn-ko {
      background: rgba(248,113,113,0.12);
      border: 1px solid rgba(248,113,113,0.3);
      color: #f87171;
    }
    .btn-ok:active, .btn-ko:active { opacity: 0.75; }

    /* ÉCRAN 3 : RÉSULTAT FINAL */
    #screen-result {
      display: none;
      min-height: 100vh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }

    .score-emoji { font-size: 64px; margin-bottom: 20px; }
    .score-title { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
    .score-sub { font-size: 16px; color: rgba(255,255,255,0.45); margin-bottom: 40px; }

    .score-big {
      font-size: 80px;
      font-weight: 200;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 8px;
    }
    .score-label { font-size: 15px; color: rgba(255,255,255,0.4); margin-bottom: 48px; }

    .btn-restart {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.7);
      border-radius: 14px;
      padding: 16px 40px;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
      max-width: 300px;
    }
    .btn-restart:active { opacity: 0.75; }
  </style>
</head>
<body>

<!-- ÉCRAN 1 : RÉVEIL + MÉTÉO -->
<div id="screen-wake">
  <p class="greeting" id="greeting-txt">Bonjour</p>
  <div class="big-time" id="clock">00:00</div>
  <div class="big-date" id="date-disp"></div>

  <div class="weather-card" id="weather-card">
    <div class="weather-loading" id="weather-loading">Chargement météo…</div>
    <div id="weather-content" style="display:none; flex-direction:column; width:100%;">
      <div style="display:flex; align-items:center; gap:16px;">
        <div class="weather-icon" id="w-icon">☀️</div>
        <div class="weather-info">
          <div class="weather-temp"><span id="w-temp">—</span>°C</div>
          <div class="weather-desc" id="w-desc">—</div>
          <div class="weather-details" id="w-details">—</div>
        </div>
      </div>
      <div class="hourly-row" id="hourly-row"></div>
    </div>
  </div>

  <button class="btn-start" id="btn-start">Commencer le quiz →</button>
  <p class="sub-hint">5 questions de culture générale</p>
</div>

<!-- ÉCRAN 2 : QUIZ -->
<div id="screen-quiz" style="display:none; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:40px 24px;">
  <div class="progress-wrap">
    <div class="progress-label">
      <span id="prog-txt">Question 1 / 5</span>
      <span id="prog-score">0 ✓</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="prog-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="quiz-card">
    <div class="q-badge" id="q-cat">Catégorie</div>
    <div class="q-text" id="q-text">Question</div>
    <div class="answer-reveal" id="q-ans"></div>
    <button class="btn-reveal" id="btn-reveal">Voir la réponse</button>
    <div class="result-row" id="result-row">
      <button class="btn-ok" id="btn-ok">✓ Correct</button>
      <button class="btn-ko" id="btn-ko">✗ Faux</button>
    </div>
  </div>
</div>

<!-- ÉCRAN 3 : RÉSULTAT -->
<div id="screen-result" style="display:none; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:40px 24px; text-align:center;">
  <div class="score-emoji" id="res-emoji">🎉</div>
  <div class="score-title" id="res-title">Bien joué !</div>
  <div class="score-sub">Session du matin terminée</div>
  <div class="score-big" id="res-score">0/5</div>
  <div class="score-label">bonnes réponses</div>
  <button class="btn-restart" id="btn-restart">Recommencer</button>
</div>

<script src="morning-questions.js"></script>
<script>
  /* ---- HORLOGE ---- */
  function updateClock() {
    const n = new Date();
    const h = n.getHours(), m = n.getMinutes();
    document.getElementById('clock').textContent =
      String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
    document.getElementById('date-disp').textContent =
      n.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});
    const g = document.getElementById('greeting-txt');
    if (h < 12) g.textContent = 'Bonjour';
    else if (h < 18) g.textContent = 'Bon après-midi';
    else g.textContent = 'Bonsoir';
  }
  updateClock();
  setInterval(updateClock, 10000);

  /* ---- MÉTÉO (Open-Meteo, gratuit, sans clé API) ---- */
  const WEATHER_ICONS = {
    0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️',
    45:'🌫️', 48:'🌫️',
    51:'🌦️', 53:'🌦️', 55:'🌧️',
    61:'🌧️', 63:'🌧️', 65:'🌧️',
    71:'🌨️', 73:'🌨️', 75:'❄️',
    80:'🌦️', 81:'🌧️', 82:'⛈️',
    95:'⛈️', 96:'⛈️', 99:'⛈️'
  };
  const WEATHER_DESC = {
    0:'Ciel dégagé', 1:'Peu nuageux', 2:'Partiellement nuageux', 3:'Couvert',
    45:'Brouillard', 48:'Brouillard givrant',
    51:'Bruine légère', 53:'Bruine', 55:'Bruine forte',
    61:'Pluie légère', 63:'Pluie modérée', 65:'Pluie forte',
    71:'Neige légère', 73:'Neige modérée', 75:'Neige forte',
    80:'Averses légères', 81:'Averses', 82:'Averses violentes',
    95:'Orage', 96:'Orage avec grêle', 99:'Orage violent'
  };

  async function loadWeather() {
    try {
      const url = 'https://api.open-meteo.com/v1/forecast?latitude=47.2184&longitude=-1.5536&current=temperature_2m,weathercode,windspeed_10m,relativehumidity_2m&hourly=temperature_2m,weathercode&timezone=Europe/Paris&forecast_days=1';
      const r = await fetch(url);
      const d = await r.json();
      const c = d.current;
      const code = c.weathercode;

      document.getElementById('w-icon').textContent = WEATHER_ICONS[code] || '🌡️';
      document.getElementById('w-temp').textContent = Math.round(c.temperature_2m);
      document.getElementById('w-desc').textContent = WEATHER_DESC[code] || 'Nantes';
      document.getElementById('w-details').textContent =
        'Vent ' + Math.round(c.windspeed_10m) + ' km/h · Humidité ' + c.relativehumidity_2m + '%';

      // Heures restantes de la journée
      const nowH = new Date().getHours();
      const times = d.hourly.time;
      const temps = d.hourly.temperature_2m;
      const codes = d.hourly.weathercode;
      const row = document.getElementById('hourly-row');
      row.innerHTML = '';

      for (let i = 0; i < times.length; i++) {
        const hStr = times[i].slice(11, 13);
        const h = parseInt(hStr);
        if (h < nowH) continue;
        const item = document.createElement('div');
        item.className = 'hour-item' + (h === nowH ? ' now' : '');
        const label = h === nowH ? 'Maint.' : hStr + 'h';
        item.innerHTML =
          '<span class="hour-time">' + label + '</span>' +
          '<span class="hour-icon">' + (WEATHER_ICONS[codes[i]] || '🌡️') + '</span>' +
          '<span class="hour-temp">' + Math.round(temps[i]) + '°</span>';
        row.appendChild(item);
      }

      document.getElementById('weather-loading').style.display = 'none';
      document.getElementById('weather-content').style.display = 'flex';
    } catch(e) {
      document.getElementById('weather-loading').textContent = 'Météo indisponible';
    }
  }
  loadWeather();

  /* ---- QUIZ ---- */
  let session = [], idx = 0, score = 0;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function startQuiz() {
    session = shuffle(QUESTIONS).slice(0, 5);
    idx = 0; score = 0;
    document.getElementById('screen-wake').style.display = 'none';
    document.getElementById('screen-result').style.display = 'none';
    document.getElementById('screen-quiz').style.display = 'flex';
    loadQ();
  }

  function loadQ() {
    const q = session[idx];
    document.getElementById('prog-txt').textContent = 'Question ' + (idx+1) + ' / 5';
    document.getElementById('prog-score').textContent = score + ' ✓';
    document.getElementById('prog-fill').style.width = (idx / 5 * 100) + '%';
    document.getElementById('q-cat').textContent = q.category;
    document.getElementById('q-text').textContent = q.question;
    const ans = document.getElementById('q-ans');
    ans.textContent = '';
    ans.classList.remove('show');
    document.getElementById('btn-reveal').style.display = 'block';
    document.getElementById('result-row').style.display = 'none';
  }

  function reveal() {
    const ans = document.getElementById('q-ans');
    ans.textContent = session[idx].answer;
    setTimeout(() => ans.classList.add('show'), 10);
    document.getElementById('btn-reveal').style.display = 'none';
    document.getElementById('result-row').style.display = 'flex';
  }

  function mark(ok) {
    if (ok) score++;
    idx++;
    if (idx >= 5) {
      showResult();
    } else {
      setTimeout(loadQ, 250);
    }
  }

  function showResult() {
    document.getElementById('screen-quiz').style.display = 'none';
    document.getElementById('screen-result').style.display = 'flex';
    document.getElementById('res-score').textContent = score + '/5';
    const emojis = ['😅','😐','🙂','😊','🔥','🏆'];
    document.getElementById('res-emoji').textContent = emojis[score];
    const titles = ['Dur de se réveiller…','Pas mal pour un réveil','Correct !','Bien joué !','Excellent !','Parfait !'];
    document.getElementById('res-title').textContent = titles[score];
    document.getElementById('prog-fill').style.width = '100%';
  }

  document.getElementById('btn-start').addEventListener('click', startQuiz);
  document.getElementById('btn-reveal').addEventListener('click', reveal);
  document.getElementById('btn-ok').addEventListener('click', function() { mark(true); });
  document.getElementById('btn-ko').addEventListener('click', function() { mark(false); });
  document.getElementById('btn-restart').addEventListener('click', function() {
    document.getElementById('screen-result').style.display = 'none';
    document.getElementById('screen-wake').style.display = 'flex';
  });
</script>
</body>
</html>
